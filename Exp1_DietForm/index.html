<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Diet Plan Registration</h2>
        <form id="dietForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" required min="10" max="100">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" id="height" required>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" id="weight" required>
            </div>
            <div class="form-group">
                <label>Food Preference</label>
                <select id="food" required>
                    <option value="">Select Preference</option>
                    <option value="veg">Vegetarian</option>
                    <option value="non-veg">Non-Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>
            <div class="form-group">
                <label>Goal</label>
                <div class="radio-group">
                    <input type="radio" name="goal" value="loss" required> Weight Loss
                    <input type="radio" name="goal" value="gain" required> Weight Gain
                </div>
            </div>
            <button type="submit">Submit Plan</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
