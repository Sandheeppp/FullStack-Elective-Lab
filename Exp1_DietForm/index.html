<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Diet Form</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container fade-in">
        <div class="form-header">
            <h2>Diet Plan Registration</h2>
            <p>Fill out the details below to customize your journey.</p>
        </div>
        <form id="dietForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" placeholder="25" required min="10" max="100">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" id="height" placeholder="175" required>
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70" required>
                </div>
                <div class="form-group">
                    <label>Food Preference</label>
                    <select id="food" required>
                        <option value="" disabled selected>Select Preference</option>
                        <option value="veg">Vegetarian</option>
                        <option value="non-veg">Non-Vegetarian</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group full-width mt-3">
                <label>Primary Goal</label>
                <div class="radio-group">
                    <label class="radio-card">
                        <input type="radio" name="goal" value="loss" required> 
                        <span class="radio-content">📉 Weight Loss</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="goal" value="gain" required> 
                        <span class="radio-content">📈 Weight Gain</span>
                    </label>
                </div>
            </div>
            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
        
        <div id="success-alert" class="alert hidden">
            ✅ Your diet plan has been registered successfully!
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
